name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Update Master Google Doc
        env:
          CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          DOC_ID: ${{ secrets.MASTER_DOC_ID }}
        run: |
          python - <<EOF
          import os
          import glob
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          creds = Credentials(
              None,
              refresh_token=os.getenv('REFRESH_TOKEN'),
              token_uri="https://oauth2.googleapis.com/token",
              client_id=os.getenv('CLIENT_ID'),
              client_secret=os.getenv('CLIENT_SECRET'),
          )

          service = build('docs', 'v1', credentials=creds)

          files = glob.glob('out/tech-news-*.txt')
          if not files:
              print("No news file found.")
              exit(1)
          
          latest_file = max(files, key=os.path.getctime)
          with open(latest_file, 'r', encoding='utf-8') as f:
              new_content = f.read()

          requests = [
              {
                  'insertText': {
                      'location': {'index': 1},
                      'text': new_content + "\n\n" + ("=" * 40) + "\n\n"
                  }
              }
          ]

          service.documents().batchUpdate(
              documentId=os.getenv('DOC_ID'),
              body={'requests': requests}
          ).execute()

          print(f"Successfully appended {latest_file} to Master Doc!")
          EOF