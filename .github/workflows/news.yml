name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *"  # 06:00 UTC every day
  workflow_dispatch:      

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WIF_POOL }}/providers/${{ secrets.GCP_WIF_PROVIDER }}"
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/drive'

      - name: Upload digest to Google Drive
        run: |
          FILE_PATH=$(ls out/tech-news-*.txt | head -n 1)
          FILE_NAME=$(basename "$FILE_PATH")
          FOLDER_ID="${{ secrets.GCP_DRIVE_FOLDER_ID }}"
          TOKEN="${{ steps.auth.outputs.access_token }}"

          echo "Searching for existing file: $FILE_NAME"
          
          # Check if file already exists in the folder
          SEARCH_RESPONSE=$(curl -s -G "https://www.googleapis.com/drive/v3/files" \
            -H "Authorization: Bearer $TOKEN" \
            --data-urlencode "q='${FOLDER_ID}' in parents and name='${FILE_NAME}' and trashed=false" \
            --data-urlencode "fields=files(id)")
          
          FILE_ID=$(echo $SEARCH_RESPONSE | jq -r '.files[0].id // empty')

          if [ -n "$FILE_ID" ]; then
            echo "File exists (ID: $FILE_ID). Updating content..."
            curl -X PATCH \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE_PATH;type=text/plain" \
              "https://www.googleapis.com/upload/drive/v3/files/$FILE_ID?uploadType=media"
          else
            echo "File not found. Creating new file..."
            curl -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -F "metadata={name: '$FILE_NAME', parents: ['$FOLDER_ID']};type=application/json;charset=UTF-8" \
              -F "file=@$FILE_PATH;type=text/plain" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"
          fi