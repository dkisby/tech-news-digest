name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: |
            {
              "client_id": "${{ secrets.DRIVE_CLIENT_ID }}",
              "client_secret": "${{ secrets.DRIVE_CLIENT_SECRET }}",
              "refresh_token": "${{ secrets.DRIVE_REFRESH_TOKEN }}",
              "type": "authorized_user"
            }
          filename: out/tech-news-*.txt
          folderId: ${{ secrets.GCP_DRIVE_FOLDER_ID }}
          overwrite: true