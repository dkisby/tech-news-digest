name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Upload to Google Drive
        env:
          CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.GCP_DRIVE_FOLDER_ID }}
        run: |
          python - <<EOF
          import os
          import glob
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # 1. Setup Credentials
          creds = Credentials(
              None,
              refresh_token=os.getenv('REFRESH_TOKEN'),
              token_uri="https://oauth2.googleapis.com/token",
              client_id=os.getenv('CLIENT_ID'),
              client_secret=os.getenv('CLIENT_SECRET'),
          )

          service = build('drive', 'v3', credentials=creds)

          # 2. Find the most recent file
          files = glob.glob('out/tech-news-*.txt')
          if not files:
              print("No files found to upload.")
              exit(0)
          
          latest_file = max(files, key=os.path.getctime)
          file_name = os.path.basename(latest_file)

          # 3. Upload the file
          file_metadata = {
              'name': file_name,
              'parents': [os.getenv('FOLDER_ID')]
          }
          media = MediaFileUpload(latest_file, mimetype='text/plain')
          
          file = service.files().create(
              body=file_metadata,
              media_body=media,
              fields='id'
          ).execute()

          print(f"Successfully uploaded {file_name} (File ID: {file.get('id')})")
          EOF