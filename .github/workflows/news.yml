name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDS: ${{ secrets.DRIVE_CLIENT_ID }}:${{ secrets.DRIVE_CLIENT_SECRET }}:${{ secrets.DRIVE_REFRESH_TOKEN }}
        run: |
          # Create the JSON structure
          JSON_STRING=$(jq -n \
            --arg id "${{ secrets.DRIVE_CLIENT_ID }}" \
            --arg secret "${{ secrets.DRIVE_CLIENT_SECRET }}" \
            --arg refresh "${{ secrets.DRIVE_REFRESH_TOKEN }}" \
            '{client_id: $id, client_secret: $secret, refresh_token: $refresh, type: "authorized_user"}')
          
          # Convert to Base64
          B64_CREDS=$(echo -n "$JSON_STRING" | base64 -w 0)
          
          # Mask the output for security and set it as an environment variable
          echo "::add-mask::$B64_CREDS"
          echo "ENCODED_CREDS=$B64_CREDS" >> $GITHUB_ENV

      - name: Finalize Upload
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ env.ENCODED_CREDS }}
          filename: out/tech-news-*.txt
          folderId: ${{ secrets.GCP_DRIVE_FOLDER_ID }}
          overwrite: true