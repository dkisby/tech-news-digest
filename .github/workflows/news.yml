name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *"  # 06:00 UTC every day
  workflow_dispatch:      

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WIF_POOL }}/providers/${{ secrets.GCP_WIF_PROVIDER }}"
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/drive'

      - name: Upload digest to Google Drive
        run: |
          set -e
          FILE_PATH=$(ls out/tech-news-*.txt | head -n 1)
          FILE_NAME=$(basename "$FILE_PATH")
          FOLDER_ID="${{ secrets.GCP_DRIVE_FOLDER_ID }}"
          TOKEN="${{ steps.auth.outputs.access_token }}"

          echo "Attempting to upload $FILE_NAME to Folder ID: $FOLDER_ID"

          RESPONSE=$(curl --request POST \
            --url "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true" \
            --header "Authorization: Bearer $TOKEN" \
            --form "metadata={name: '$FILE_NAME', parents: ['$FOLDER_ID']};type=application/json;charset=UTF-8" \
            --form "file=@$FILE_PATH;type=text/plain")

          echo "Full Google Response: $RESPONSE"

          if [[ $RESPONSE != *"\"id\":"* ]]; then
            echo "Error: Upload did not return a file ID."
            exit 1
          fi