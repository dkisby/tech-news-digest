name: Daily Tech News Digest

on:
  schedule:
    - cron: "0 5 * * *"  # 06:00 UTC every day
  workflow_dispatch:      # allow manual runs too

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news script
        run: python main.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tech news digest"
            git push
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WIF_POOL }}/providers/${{ secrets.GCP_WIF_PROVIDER }}"
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload digest to Google Drive
        uses: willo32/google-drive-upload-action@v1
        with:
          token: ${{ steps.auth.outputs.access_token }}
          file: out/tech-news-latest.txt
          folderId: YOUR_DRIVE_FOLDER_ID
